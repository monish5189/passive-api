<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}
input{
    width:90%;
    padding:10px;
    margin:8px;
}
button{
    padding:12px 20px;
}
</style>
</head>
<body>

<div class="card">

<h1>💰 EMI Calculator</h1>

<input id="principal" type="number" value="1000000" placeholder="Loan Amount">

<input id="rate" type="number" value="8.5" placeholder="Interest Rate">

<input id="years" type="number" value="20" placeholder="Years">

<button onclick="calc()">Calculate EMI</button>

<h2 id="result"></h2>

</div>

<script>
function calc(){
    let p = parseFloat(document.getElementById('principal').value);
    let r = parseFloat(document.getElementById('rate').value)/12/100;
    let n = parseFloat(document.getElementById('years').value)*12;

    let emi = p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);

    document.getElementById('result').innerHTML =
        "Monthly EMI: ₹" + emi.toFixed(2);
}
</script>

</body>
</html>
