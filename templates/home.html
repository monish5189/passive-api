<!DOCTYPE html>
<html>
<head>
<title>Passive Income API</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    max-width:900px;
    margin:auto;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}
.tool{
    background:#334155;
    padding:15px;
    border-radius:10px;
}
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 16px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>
<body>

<h1>🚀 Passive Income API</h1>
<p>Finance, Business, Crypto, Weather & Utility Tools</p>

<div class="card">

<div class="grid">

<div class="tool">
<h3>💰 EMI</h3>
<a class="btn" href="/emi">Open</a>
</div>

<div class="tool">
<h3>🧾 GST</h3>
<a class="btn" href="/gst">Open</a>
</div>

<div class="tool">
<h3>📈 SIP</h3>
<a class="btn" href="/sip">Open</a>
</div>

<div class="tool">
<h3>📱 QR</h3>
<a class="btn" href="/qr">Open</a>
</div>

<div class="tool">
<h3>₿ Crypto</h3>
<a class="btn" href="/crypto">Open</a>
</div>

<div class="tool">
<h3>🌦 Weather</h3>
<a class="btn" href="/weather">Open</a>
</div>

<div class="tool">
<h3>⚖ BMI</h3>
<a class="btn" href="/bmi">Open</a>
</div>

<div class="tool">
<h3>💱 Forex</h3>
<a class="btn" href="/forex">Open</a>
</div>

</div>

<br>

<a class="btn" href="/docs">API Docs</a>

</div>

</body>
</html>
